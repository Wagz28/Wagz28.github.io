<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | Ben Wagstaff</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>{{ page.title }}</h1>
      <p class="tagline">
        {% if page.date %}{{ page.date | date: "%-d %B %Y" }}{% endif %}
      </p>
      <p><a href="/poetry/">← Back to Poetry</a></p>
    </header>

    <section class="section poem-page">
      {% if page.summary %}
        <p class="poem-summary">{{ page.summary }}</p>
      {% endif %}

      <article class="poem-body">
        {{ content }}
      </article>

      {% if page.tags %}
        <p class="poem-tags">
          {% for tag in page.tags %}
            <span class="poem-tag">{{ tag }}</span>
          {% endfor %}
        </p>
      {% endif %}
    </section>
  </main>
</body>
</html>
