<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
      const parts = path.split("/");

      if (parts[0] === "s" && parts[1]) {
        const src = encodeURIComponent(parts[1]);
        sessionStorage.setItem("site_src", parts[1]);
        window.location.replace("/?src=" + src);
        return;
      }

      window.location.replace("/");
    })();
  </script>
</head>
<body></body>
</html>
