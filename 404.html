<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      const path = window.location.pathname;
      const match = path.match(/^\/s\/([^/]+)(\/.*)?$/);

      if (match) {
        const src = decodeURIComponent(match[1]);
        const remainder = match[2] || "/";

        sessionStorage.setItem("site_src", src);

        const target = remainder + window.location.search + window.location.hash;
        window.location.replace(target);
        return;
      }

      window.location.replace("/");
    })();
  </script>
</head>
<body></body>
</html>
